name: electron-release.yml

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  # ── Job 1: Build the Windows installer ───────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Upgrade npm to fix node-gyp bug
        run: npm install -g npm@latest

      - name: Install Electron App Dependencies
        working-directory: apps/electron
        run: npm install

      - name: Install Controller Node Dependencies (public registry)
        # better-sqlite3 and node-pty are native addons — must install from the public
        # npm registry, not from Azure Artifacts or any private feed.
        working-directory: apps/controller-node
        run: npm install --registry https://registry.npmjs.org

      - name: Install Desktop UI Dependencies
        working-directory: apps/desktop-ui
        run: npm install

      - name: Rebuild better-sqlite3 for Electron ABI
        # CRITICAL: The CI runner's Node.js (v20.x, ABI 115) differs from Electron 31.x's
        # embedded Node (also v20 but with a different ABI due to patches — ABI 125).
        # Without this step, better-sqlite3 loads fine in CI's Node but crashes at runtime
        # inside the packaged Electron app, giving:
        #   "The module was compiled against a different Node.js version"
        # @electron/rebuild downloads a prebuilt binary targeting Electron's exact ABI.
        # This MUST run BEFORE `npm prune` because prune removes @electron/rebuild.
        working-directory: apps/controller-node
        run: npm run rebuild:electron

      - name: Build Controller Node
        run: npm run controller:build

      - name: Build Desktop UI
        run: npm run ui:build

      - name: Build Electron Main Process
        run: npm run electron:build

      - name: Prune Dev Dependencies from Controller Node
        # Run AFTER rebuild:electron — pruning removes @electron/rebuild and other devDeps.
        # The native binary is already in build/Release/ so pruning doesn't affect it.
        working-directory: apps/controller-node
        run: npm prune --omit=dev

      - name: Package Installer (electron-builder)
        # npmRebuild is set to false in electron-builder.yml because we already rebuilt
        # better-sqlite3 in the "Rebuild better-sqlite3 for Electron ABI" step above.
        # electron-builder's built-in rebuild would target its own node_modules root,
        # missing the controller-node directory entirely.
        working-directory: apps/electron
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Installer for Release Job
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-build
          path: apps/electron/dist-electron/*.exe
          retention-days: 1

  # ── Job 2: Publish GitHub Release ────────────────────────────────────────────
  release:
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download Installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer-build
          path: ./installer

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.5.${{ github.run_number }}
          name: OctoML v0.5.${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ./installer/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Final Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OctoML-Windows-Installer
          path: ./installer/*.exe
          retention-days: 30
